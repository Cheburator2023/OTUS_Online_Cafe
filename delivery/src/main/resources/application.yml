spring:
  application:
    name: delivery
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/delivery_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

springdoc:
  packages-to-scan: ru.otus.delivery.controller
  paths-to-match: /api/v1/delivery/**
  use-management-port: false
  show-actuator: false

server:
  port: 8005

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      sla:
        http.server.requests: 10ms, 50ms, 100ms, 200ms, 300ms, 400ms, 500ms, 600ms, 800ms
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    org.springdoc: DEBUG
    org.springframework: DEBUG
    ru.otus.delivery: DEBUG
    org.springframework.web: DEBUG
