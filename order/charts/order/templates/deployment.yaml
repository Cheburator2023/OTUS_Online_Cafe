apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-db-secret
                  key: url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-db-secret
                  key: password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "validate"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-jwt-secret
                  key: jwt-secret
            - name: SERVICES_BILLING_URL
              value: {{ .Values.services.billing.url | quote }}
            - name: SERVICES_NOTIFICATION_URL
              value: {{ .Values.services.notification.url | quote }}
            - name: SERVICES_STOCK_URL
              value: {{ .Values.services.stock.url | quote }}
            - name: SERVICES_DELIVERY_URL
              value: {{ .Values.services.delivery.url | quote }}